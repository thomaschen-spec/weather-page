name: Update weather page
# retrigger workflow registration

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch weather and regenerate page
        run: python scripts/fetch_weather.py

      - name: Commit and push if changed
        run: |
          git config user.name "weather-bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add public/index.html
          git diff --cached --quiet || git commit -m "auto: update weather"
          git push
