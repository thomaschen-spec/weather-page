<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣立體天氣地圖</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0e1a2b; height: 100%; }
  #app { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; }

  #picker {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(15, 25, 40, 0.75); backdrop-filter: blur(6px);
    border-radius: 10px; padding: 10px 14px;
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
  }
  #picker select {
    background: #16273d; color: #eaf3ff; border: 1px solid #2c4a6e; border-radius: 6px;
    padding: 8px 10px; font-size: 0.95rem;
  }
  #hint {
    position: absolute; bottom: 14px; left: 16px; z-index: 10; color: #9fb3c8;
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; font-size: 0.75rem;
  }

  #compass {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(15, 25, 40, 0.75); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  #compass svg { width: 100%; height: 100%; }
  #compass .needle { transform-origin: 32px 32px; transition: transform 0.05s linear; }

  .weather-card {
    position: absolute; z-index: 20; transform: translate(-50%, -100%);
    background: rgba(20, 35, 55, 0.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 12px 16px;
    color: #f2f7ff; font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    min-width: 160px; pointer-events: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  }
  .weather-card .close { position: absolute; top: 4px; right: 8px; cursor: pointer; color: #9fb3c8; font-size: 0.85rem; }
  .weather-card .city { font-weight: bold; font-size: 1.05rem; margin-bottom: 4px; }
  .weather-card .icon { font-size: 1.8rem; }
  .weather-card .temp { font-size: 1.6rem; font-weight: bold; display: inline-block; margin-left: 6px; vertical-align: middle; }
  .weather-card .desc { font-size: 0.85rem; color: #cdd9e6; margin: 2px 0 8px; }
  .weather-card .rows { font-size: 0.8rem; color: #dbe6f2; line-height: 1.6; }
  .weather-card .loading { font-size: 0.85rem; color: #9fb3c8; }
  .weather-card .outfit {
    margin-top: 8px; padding: 6px 8px; border-radius: 8px; font-size: 0.78rem;
    background: rgba(255,255,255,0.08);
  }
  .weather-card .alert {
    margin-top: 8px; padding: 6px 8px; border-radius: 8px; font-size: 0.78rem;
    background: rgba(224, 82, 82, 0.25); border: 1px solid rgba(224, 82, 82, 0.5); color: #ffd7d7;
  }
</style>
</head>
<body>
<div id="app">
  <div id="picker">
    <select id="countySelect"><option value="">選縣市…</option></select>
  </div>
  <div id="hint">滑鼠拖曳旋轉／滾輪縮放；點擊或用選單選一個縣市查看天氣</div>
  <div id="compass" title="指南針：紅色箭頭永遠指向畫面上的地理北方">
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="32" y="12" fill="#eaf3ff" font-size="10" text-anchor="middle" font-family="sans-serif">N</text>
      <text x="32" y="58" fill="#9fb3c8" font-size="9" text-anchor="middle" font-family="sans-serif">S</text>
      <text x="8" y="35" fill="#9fb3c8" font-size="9" text-anchor="middle" font-family="sans-serif">W</text>
      <text x="56" y="35" fill="#9fb3c8" font-size="9" text-anchor="middle" font-family="sans-serif">E</text>
      <g class="needle" id="compassNeedle">
        <polygon points="32,10 27,32 32,27 37,32" fill="#e05252"/>
        <polygon points="32,54 27,32 32,37 37,32" fill="#9fb3c8"/>
      </g>
    </svg>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from "three";

const WEATHER_ICONS = {
  0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
  45: "🌫️", 48: "🌫️",
  51: "🌦️", 53: "🌦️", 55: "🌦️",
  61: "🌧️", 63: "🌧️", 65: "🌧️",
  71: "🌨️", 73: "🌨️", 75: "🌨️",
  80: "🌦️", 81: "🌧️", 82: "⛈️",
  95: "⛈️", 96: "⛈️", 99: "⛈️",
};
const WEATHER_DESC = {
  0: "晴朗", 1: "大致晴朗", 2: "多雲時晴", 3: "陰天",
  45: "有霧", 48: "有霧",
  51: "毛毛雨", 53: "毛毛雨", 55: "毛毛雨",
  61: "小雨", 63: "中雨", 65: "大雨",
  71: "小雪", 73: "中雪", 75: "大雪",
  80: "陣雨", 81: "陣雨", 82: "強陣雨",
  95: "雷雨", 96: "雷雨", 99: "強雷雨",
};

const app = document.getElementById("app");
const select = document.getElementById("countySelect");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1a2b);
scene.fog = new THREE.Fog(0x0e1a2b, 3000, 14000);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 5, 30000);
camera.position.set(0, 5500, 5500);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
app.prepend(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(3000, 6000, 2000);
scene.add(sun);

// ---- 簡易軌道控制（拖曳旋轉、滾輪縮放，不依賴 OrbitControls 額外檔案）----
let spherical = { radius: 7000, theta: Math.PI, phi: 0.5 };
let dragging = false, lastX = 0, lastY = 0;
function updateCamera() {
  const r = spherical.radius, t = spherical.theta, p = spherical.phi;
  camera.position.set(
    cameraTarget.x + r * Math.sin(p) * Math.sin(t),
    cameraTarget.y + r * Math.cos(p),
    cameraTarget.z + r * Math.sin(p) * Math.cos(t)
  );
  camera.lookAt(cameraTarget);
}
let cameraTarget = new THREE.Vector3(0, 0, 0);
renderer.domElement.addEventListener("pointerdown", (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("pointerup", () => dragging = false);
window.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  spherical.theta -= (e.clientX - lastX) * 0.005;
  spherical.phi = Math.min(1.3, Math.max(0.15, spherical.phi - (e.clientY - lastY) * 0.005));
  lastX = e.clientX; lastY = e.clientY;
  updateCamera();
});
renderer.domElement.addEventListener("wheel", (e) => {
  spherical.radius = Math.min(14000, Math.max(800, spherical.radius + e.deltaY * 2));
  updateCamera();
}, { passive: true });
updateCamera();

// ---- 讀取縣市資料，蓋出立體色塊 ----
const countyMeshes = [];
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

const palette = [0x2a7f9e, 0x2f8f7a, 0x4a8f5c, 0x8f7a2f, 0x9e5a2a, 0x7a4a8f, 0x2a5a9e];

fetch("./map-data.json")
  .then((r) => r.json())
  .then((data) => {
    data.counties.forEach((county, i) => {
      const shape = new THREE.Shape(county.outline.map(([x, y]) => new THREE.Vector2(x, -y)));
      const geometry = new THREE.ExtrudeGeometry(shape, { depth: 220, bevelEnabled: true, bevelThickness: 20, bevelSize: 20, bevelSegments: 1 });
      geometry.rotateX(-Math.PI / 2);
      const material = new THREE.MeshStandardMaterial({
        color: palette[i % palette.length],
        roughness: 0.75,
        metalness: 0.05,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData.county = county;
      scene.add(mesh);
      countyMeshes.push(mesh);

      const opt = document.createElement("option");
      opt.value = county.name;
      opt.textContent = county.name;
      select.appendChild(opt);
    });
  });

// ---- 放大某縣市時，長出低多邊形小房塊＋一層霧化效果 ----
const cityDecor = new THREE.Group();
scene.add(cityDecor);

function pointInPolygon(x, y, outline) {
  let inside = false;
  for (let i = 0, j = outline.length - 1; i < outline.length; j = i++) {
    const [xi, yi] = outline[i];
    const [xj, yj] = outline[j];
    const intersect = (yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function makeMistTexture() {
  const size = 256;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, "rgba(210,225,240,0.55)");
  grad.addColorStop(0.6, "rgba(210,225,240,0.22)");
  grad.addColorStop(1, "rgba(210,225,240,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}
const mistTexture = makeMistTexture();

function clearCityDecor() {
  while (cityDecor.children.length) {
    const obj = cityDecor.children.pop();
    obj.geometry?.dispose?.();
    obj.material?.dispose?.();
  }
}

function spawnCityDecor(county) {
  clearCityDecor();

  const xs = county.outline.map(([x]) => x);
  const ys = county.outline.map(([, y]) => y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);

  // 隨機灑低多邊形小房塊，只保留落在縣市範圍內的點
  const buildingCount = 26;
  let placed = 0, attempts = 0;
  while (placed < buildingCount && attempts < buildingCount * 12) {
    attempts++;
    const x = minX + Math.random() * (maxX - minX);
    const y = minY + Math.random() * (maxY - minY);
    if (!pointInPolygon(x, y, county.outline)) continue;

    const w = 12 + Math.random() * 22;
    const d = 12 + Math.random() * 22;
    const h = 30 + Math.random() * 130;
    const geometry = new THREE.BoxGeometry(w, h, d);
    const shade = 0.55 + Math.random() * 0.35;
    const material = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0.85 * shade, 0.82 * shade, 0.78 * shade),
      roughness: 0.9,
    });
    const box = new THREE.Mesh(geometry, material);
    box.position.set(x, 220 + h / 2, y);
    cityDecor.add(box);
    placed++;
  }

  // 半透明霧化片，飄在小房塊上方
  for (let i = 0; i < 3; i++) {
    const mist = new THREE.Sprite(new THREE.SpriteMaterial({ map: mistTexture, transparent: true, depthWrite: false }));
    const w = 260 + Math.random() * 180;
    mist.scale.set(w, w * 0.55, 1);
    const cx = minX + Math.random() * (maxX - minX);
    const cy = minY + Math.random() * (maxY - minY);
    mist.position.set(cx, 260 + Math.random() * 60, cy);
    mist.userData.baseY = mist.position.y;
    mist.userData.phase = Math.random() * Math.PI * 2;
    cityDecor.add(mist);
  }
}

function projectCentroidToScreen(county) {
  const [lon, lat] = county.centroidLonLat;
  const LAT0 = 23.6, LON0 = 120.9;
  const SCALE = 1 / 100;
  const mPerLat = 110540, mPerLon = 111320 * Math.cos((LAT0 * Math.PI) / 180);
  const x = -(lon - LON0) * mPerLon * SCALE;
  const z = (lat - LAT0) * mPerLat * SCALE;
  const worldPos = new THREE.Vector3(x, 260, z);
  const screenPos = worldPos.clone().project(camera);
  return {
    x: (screenPos.x * 0.5 + 0.5) * window.innerWidth,
    y: (1 - (screenPos.y * 0.5 + 0.5)) * window.innerHeight,
    world: worldPos,
  };
}

const openCards = new Map(); // county name -> {el, worldPos}

async function fetchWeather(lon, lat) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m&timezone=Asia%2FTaipei`;
  const res = await fetch(url);
  return res.json();
}

const SEVERE_CODES = new Set([65, 67, 75, 82, 95, 96, 99]); // 大雨/大雪/強陣雨/雷雨
function severeAlert(c) {
  if (SEVERE_CODES.has(c.weather_code)) return "⚠️ 大雨雷雨特報，注意防範積水、雷擊";
  if (c.wind_speed_10m >= 50) return "⚠️ 強風特報，外出請注意招牌與飛落物";
  if (c.apparent_temperature >= 38) return "⚠️ 高溫警示，體感溫度極高，避免長時間曝曬";
  if (c.apparent_temperature <= 5) return "⚠️ 低溫特報，注意保暖";
  if ((c.precipitation_probability ?? 0) >= 80) return "☔ 降雨機率很高，記得帶傘";
  return null;
}

function outfitSuggestion(c) {
  const t = c.apparent_temperature;
  let base;
  if (t >= 30) base = "🩳 天氣炎熱，短袖短褲＋防曬，多補充水分";
  else if (t >= 25) base = "👕 舒適溫暖，短袖或薄長袖都可以";
  else if (t >= 20) base = "🧥 微涼，建議薄外套或長袖";
  else if (t >= 15) base = "🧣 有點涼，穿件外套比較保險";
  else base = "🧤 偏冷，記得穿保暖外套，注意保暖";
  if ((c.precipitation_probability ?? 0) >= 50) base += "，降雨機率高記得帶傘";
  return base;
}

function openWeatherCard(county) {
  if (openCards.has(county.name)) return;

  const card = document.createElement("div");
  card.className = "weather-card";
  card.innerHTML = `<span class="close">✕</span><div class="city">${county.name}</div><div class="loading">讀取天氣中…</div>`;
  app.appendChild(card);
  card.querySelector(".close").addEventListener("click", () => {
    card.remove();
    openCards.delete(county.name);
  });
  openCards.set(county.name, card);

  const [lon, lat] = county.centroidLonLat;
  fetchWeather(lon, lat).then((data) => {
    const c = data.current;
    if (!c) { card.querySelector(".loading").textContent = "抓不到資料"; return; }
    const icon = WEATHER_ICONS[c.weather_code] ?? "🌡️";
    const desc = WEATHER_DESC[c.weather_code] ?? "";
    const alertMsg = severeAlert(c);
    const outfitMsg = outfitSuggestion(c);
    card.innerHTML = `
      <span class="close">✕</span>
      <div class="city">${county.name}</div>
      <span class="icon">${icon}</span><span class="temp">${Math.round(c.temperature_2m)}°</span>
      <div class="desc">${desc}</div>
      <div class="rows">
        體感溫度：${Math.round(c.apparent_temperature)}°<br>
        濕度：${Math.round(c.relative_humidity_2m)}%<br>
        降雨機率：${c.precipitation_probability ?? "-"}%
      </div>
      <div class="outfit">${outfitMsg}</div>
      ${alertMsg ? `<div class="alert">${alertMsg}</div>` : ""}`;
    card.querySelector(".close").addEventListener("click", () => {
      card.remove();
      openCards.delete(county.name);
    });
  }).catch(() => {
    card.querySelector(".loading").textContent = "網路或資料錯誤";
  });
}

function focusCounty(name) {
  const mesh = countyMeshes.find((m) => m.userData.county.name === name);
  if (!mesh) return;
  mesh.geometry.computeBoundingBox();
  const box = mesh.geometry.boundingBox;
  const center = new THREE.Vector3();
  box.getCenter(center);
  cameraTarget = center;
  spherical.radius = 900;
  updateCamera();
  spawnCityDecor(mesh.userData.county);
  openWeatherCard(mesh.userData.county);
}

select.addEventListener("change", () => {
  if (select.value) focusCounty(select.value);
});

renderer.domElement.addEventListener("click", (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(countyMeshes);
  if (hits.length) {
    const county = hits[0].object.userData.county;
    select.value = county.name;
    focusCounty(county.name);
  }
});

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const compassNeedle = document.getElementById("compassNeedle");
const worldNorth = new THREE.Vector3(0, 0, 1);
function updateCompass() {
  // 世界座標 +Z＝地理北方（跟 build_map_data.mjs 的投影約定一致）；
  // 把北方向量轉進「攝影機視角空間」，x=螢幕右分量、y=螢幕上分量，直接算夾角，
  // 不受畫面上兩點距離造成的透視變形影響（比投影兩個點再算夾角準確）
  camera.updateMatrixWorld();
  const viewNorth = worldNorth.clone().transformDirection(camera.matrixWorldInverse);
  const angleDeg = Math.atan2(viewNorth.x, viewNorth.y) * (180 / Math.PI);
  compassNeedle.setAttribute("transform", `rotate(${angleDeg} 32 32)`);
}

function animate() {
  requestAnimationFrame(animate);
  for (const [name, card] of openCards) {
    const mesh = countyMeshes.find((m) => m.userData.county.name === name);
    if (!mesh) continue;
    mesh.geometry.computeBoundingBox();
    const center = new THREE.Vector3();
    mesh.geometry.boundingBox.getCenter(center);
    const pos = projectCentroidToScreen(mesh.userData.county);
    card.style.left = `${pos.x}px`;
    card.style.top = `${pos.y}px`;
  }
  updateCompass();
  const t = performance.now() / 1000;
  for (const obj of cityDecor.children) {
    if (obj.isSprite) {
      obj.position.y = obj.userData.baseY + Math.sin(t * 0.4 + obj.userData.phase) * 12;
    }
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
